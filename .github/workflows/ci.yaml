name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-xschem-rocky8:
    name: xschem + CORE (Rocky Linux 8)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    container:
      image: rockylinux:8

    steps:
      - name: Checkout XSchem-coredb
        uses: actions/checkout@v4
        with:
          path: XSchem-coredb

      - name: Checkout CommonDB
        uses: actions/checkout@v4
        with:
          repository: IHP-GmbH/CommonDB
          path: CommonDB
          token: ${{ secrets.GH_PAT }}

      - name: Install dependencies
        run: bash XSchem-coredb/scripts/ci-rocky8-deps.sh

      - name: Cache Cap'n Proto (Linux)
        uses: actions/cache@v4
        with:
          path: CommonDB/third_party/capnp-install-linux
          key: capnp-linux-rocky8-v1-${{ hashFiles('CommonDB/scripts/build_capnp_linux.sh') }}
          restore-keys: |
            capnp-linux-rocky8-v1-

      - name: Bootstrap Cap'n Proto
        run: |
          COMMONDB_ROOT="$GITHUB_WORKSPACE/CommonDB"
          sed -i 's/\r$//' "$COMMONDB_ROOT/scripts/build_capnp_linux.sh"
          CAPNP_SKIP_CHECK=1 bash "$COMMONDB_ROOT/scripts/build_capnp_linux.sh" \
            "https://github.com/capnproto/capnproto.git" branch master "" "" \
            "$COMMONDB_ROOT/third_party/capnproto-linux" \
            "$COMMONDB_ROOT/third_party/capnp-install-linux"

      - name: Build and install xschem
        run: |
          export XSCHEM_ROOT="$GITHUB_WORKSPACE/XSchem-coredb"
          export INSTALL_PREFIX="$XSCHEM_ROOT/dist-install"
          sed -i 's/\r$//' "$XSCHEM_ROOT/scripts/build-xschem-ci.sh"
          bash "$XSCHEM_ROOT/scripts/build-xschem-ci.sh"

      - name: Build coretcl.so
        run: |
          export XSCHEM_ROOT="$GITHUB_WORKSPACE/XSchem-coredb"
          export COMMONDB_ROOT="$GITHUB_WORKSPACE/CommonDB"
          sed -i 's/\r$//' "$XSCHEM_ROOT/build-core-tcl.sh" "$COMMONDB_ROOT/scripts/build_capnp_linux.sh"
          bash "$XSCHEM_ROOT/build-core-tcl.sh"
          test -f "$XSCHEM_ROOT/integrations/coretcl.so"

      - name: Verify binaries
        run: |
          PREFIX="$GITHUB_WORKSPACE/XSchem-coredb/dist-install"
          test -x "$PREFIX/bin/xschem"
          test -f "$GITHUB_WORKSPACE/XSchem-coredb/integrations/coretcl.so"

      - name: Package portable bundle
        run: |
          export XSCHEM_ROOT="$GITHUB_WORKSPACE/XSchem-coredb"
          export CAPNP_ROOT="$GITHUB_WORKSPACE/CommonDB/third_party/capnp-install-linux"
          sed -i 's/\r$//' "$XSCHEM_ROOT/scripts/package_xschem_linux_bundle.sh"
          bash "$XSCHEM_ROOT/scripts/package_xschem_linux_bundle.sh" \
            "$XSCHEM_ROOT/dist-install" \
            "$XSCHEM_ROOT/xschem-rocky8-bundle.tar.gz" \
            "Rocky Linux 8"

      - name: Upload xschem bundle
        uses: actions/upload-artifact@v4
        with:
          name: xschem-rocky8
          path: XSchem-coredb/xschem-rocky8-bundle.tar.gz
